<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:#060a14;overflow:hidden;width:100vw;height:100vh;user-select:none;}
.hdr{position:fixed;top:0;left:0;right:0;height:46px;background:rgba(6,10,20,.97);border-bottom:2px solid #F5A623;display:flex;align-items:center;gap:10px;padding:0 16px;z-index:100;}
.hdr-badge{background:#F5A623;color:#000;font-size:11px;font-weight:700;padding:2px 10px;border-radius:20px;}
.hdr h1{font-size:15px;font-weight:900;color:#fff;}
.hdr-hint{margin-left:auto;font-size:11px;color:rgba(255,255,255,.4);}
.hdr-back{font-size:11px;color:#F5A623;text-decoration:none;font-weight:700;border:1.5px solid #F5A623;border-radius:20px;padding:3px 10px;white-space:nowrap;}
#wrap{position:fixed;top:46px;left:0;right:0;bottom:0;overflow:hidden;touch-action:none;}
#inner{position:absolute;transform-origin:0 0;will-change:transform;}
svg{display:block;}
.panel{position:fixed;right:14px;bottom:14px;width:280px;max-height:65vh;overflow-y:auto;background:rgba(6,10,20,.97);border:1.5px solid rgba(255,255,255,.15);border-radius:14px;padding:14px 16px;color:#fff;opacity:0;transform:translateY(12px);transition:opacity .25s,transform .25s;pointer-events:none;z-index:200;scrollbar-width:thin;}
.panel.show{opacity:1;transform:translateY(0);pointer-events:auto;}
.panel-close{position:absolute;top:10px;right:12px;background:none;border:none;color:rgba(255,255,255,.4);font-size:18px;cursor:pointer;line-height:1;}
.panel-subject{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:6px;}
.panel-title{font-size:16px;font-weight:900;margin-bottom:8px;line-height:1.35;}
.panel-keys{list-style:none;font-size:12px;line-height:1.85;}
.panel-keys li{display:flex;gap:6px;align-items:flex-start;}
.panel-keys li::before{content:'▸';color:#F5A623;flex-shrink:0;margin-top:1px;}
.panel-link{display:inline-block;margin-top:10px;padding:5px 14px;background:#F5A623;color:#000;border-radius:20px;font-size:11px;font-weight:700;text-decoration:none;}
#lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:1000;cursor:zoom-out;align-items:center;justify-content:center;}
#lb.open{display:flex;}
#lb img{max-width:92vw;max-height:88vh;border-radius:8px;}
.ctrl{position:fixed;left:14px;bottom:14px;background:rgba(6,10,20,.9);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:8px 12px;z-index:100;display:flex;flex-direction:column;gap:4px;}
.ctrl-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:6px;color:#fff;font-size:11px;font-weight:700;cursor:pointer;padding:4px 10px;font-family:Noto Sans JP,sans-serif;}
.ctrl-btn:hover{background:rgba(255,255,255,.18);}
.legend{position:fixed;left:14px;top:58px;background:rgba(6,10,20,.9);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:8px 12px;z-index:100;max-height:calc(100vh - 130px);overflow-y:auto;scrollbar-width:none;}
.legend-item{display:flex;align-items:center;gap:7px;font-size:10px;color:rgba(255,255,255,.75);margin-bottom:3px;cursor:pointer;border-radius:4px;padding:2px 4px;transition:background .15s;}
.legend-item:hover{background:rgba(255,255,255,.08);}
.legend-item.active-subj{background:rgba(255,255,255,.12);}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.legend-sep{border-top:1px solid rgba(255,255,255,.1);margin:5px 0;}
.legend-dash{width:18px;height:0;border-top:2px dashed;flex-shrink:0;}
.legend-title{font-size:9px;font-weight:700;color:rgba(255,255,255,.4);margin-bottom:4px;}
</style>
</head>
<body>
<div class="hdr">
  <span class="hdr-badge">MEC</span>
  <h1>🗺️ 全科目統合 疾患マインドマップ</h1>
  <span class="hdr-hint">科目をタップ→疾患展開 ／ 複数科目で横断リンク表示</span>
  <a class="hdr-back" href="index.html">← ホーム</a>
</div>
<div id="wrap"><div id="inner"><svg id="svg" xmlns="http://www.w3.org/2000/svg"></svg></div></div>
<div class="panel" id="panel">
  <button class="panel-close" id="panelClose">✕</button>
  <div class="panel-subject" id="panelSubj"></div>
  <div class="panel-title" id="panelTitle"></div>
  <ul class="panel-keys" id="panelKeys"></ul>
  <a class="panel-link" id="panelLink" href="#">📚 科目マップへ →</a>
</div>
<div id="lb"><img id="lbImg" src="" alt=""/></div>
<div class="ctrl">
  <button class="ctrl-btn" id="btnAll">全科目展開</button>
  <button class="ctrl-btn" id="btnNone">全科目閉じる</button>
</div>
<div class="legend" id="legend">
  <div class="legend-title">科目（タップで展開）</div>
</div>
<script>
const CX=1000,CY=1000,R1=265,R2=710,W=2000,H=2000;

const SUBJECTS=[
  {id:'endo',label:'内分泌',icon:'🔬',color:'#9C27B0',angle:-90,href:'内分泌/mindmap.html',diseases:[
    {id:'endo_dm',   label:'糖尿病',         keys:['1型/2型；HbA1c≥6.5%で診断','DKA（1型）・HHS（2型）：急性合併症','三大慢性合併症：網膜症・腎症・神経障害','心血管リスク：AMI・脳梗塞・末梢動脈疾患の主要危険因子']},
    {id:'endo_hyper',label:'甲状腺機能亢進症', keys:['バセドウ病（抗TSHr抗体）；FT4↑・TSH↓','心房細動・骨粗鬆症・心不全誘発','甲状腺クリーゼ：発熱・意識障害→緊急（MMI+ヨード+βB+ステロイド）','抗甲状腺薬（MMI第一選択）・RAI・手術']},
    {id:'endo_cush', label:'クッシング症候群', keys:['ACTH依存性（下垂体/異所性）vs 非依存性','満月様顔・水牛肩・皮膚線条・高血圧・高血糖・易感染','深夜コルチゾール↑・0.5mg DST非抑制','下垂体腺腫→経蝶形骨洞手術；副腎腫瘍→副腎摘除']},
    {id:'endo_aldo', label:'原発性アルドステロン症',keys:['アルドステロン過剰（副腺腫/過形成）','高血圧＋低K血症；ARR>200で疑い','副腎静脈サンプリングで側性診断','腺腫→腹腔鏡下摘除；両側過形成→MRA（スピロノラクトン）']},
    {id:'endo_pheo', label:'褐色細胞腫',      keys:['副腎髄質のカテコラミン産生腫瘍（10%悪性・両側・副腎外）','発作性頭痛・発汗・動悸（三徴）','尿中カテコラミン・メタネフリン↑；MIBG/PETシンチ','術前α遮断（フェノキシベンザミン）を十分に行ってから手術']},
    {id:'endo_hca',  label:'高Ca血症',        keys:['原発性副甲状腺機能亢進症（最多）・悪性腫瘍（PTHrP）','多尿・便秘・筋力低下・精神症状・腎結石','PTH↑→原発性；PTH↓・PTHrP↑→悪性腫瘍','治療：補液＋ビスホスホネート；重症→透析']},
    {id:'endo_adrenal',label:'副腎不全',      keys:['原発性（Addison）：コルチゾール↓・アルドステロン↓','低血圧・低Na・高K・色素沈着（MSH過剰）','副腎クリーゼ：ヒドロコルチゾン100mg急速静注が最優先','自己免疫（先進国）・転移癌（肺癌が多い）・結核']},
    {id:'endo_met',  label:'代謝症候群',      keys:['内臓脂肪型肥満＋血糖・血圧・脂質の3因子','高LDL：スタチン；FH（腱黄色腫）→PCSK9阻害薬','高尿酸血症（>7 mg/dL）→痛風発作・尿路結石','インスリン抵抗性→2型DM・NASH・多嚢胞性卵巣症候群']},
  ]},
  {id:'circ',label:'循環器',icon:'🫀',color:'#C62828',angle:-45,href:'循環器/mindmap.html',diseases:[
    {id:'circ_ami',  label:'急性心筋梗塞',   keys:['STEMI：ST上昇→緊急PCI（DTB<90分）','Killip分類；Tn↑・CK-MB↑','合併症：乳頭筋断裂・VSP・自由壁破裂・心室瘤','二次予防：DAPT＋スタチン＋ACE-I＋βB']},
    {id:'circ_hf',   label:'心不全',         keys:['HFrEF(EF<40%)：ARNI+βB+MRA+SGLT2（4剤）','HFpEF(EF≥50%)：SGLT2・利尿薬','BNP>100 pg/mL；NYHA分類','心腎症候群：心出力↓→腎灌流↓→AKI→利尿薬抵抗']},
    {id:'circ_af',   label:'心房細動',       keys:['f波不整；CHADS₂スコアで脳塞栓リスク評価','CHADS₂≥2：DOAC（抗凝固）必須','レートコントロール vs リズムコントロール','肺静脈隔離術（PVI）：根治的カテーテルアブレーション']},
    {id:'circ_ie',   label:'感染性心内膜炎', keys:['疣贅（vegetation）→塞栓症（脳・腎・脾・冠）','発熱＋新規心雑音；血液培養3セット（抗菌薬前）','TEEで疣贅・弁破壊・膿瘍；Duke基準','長期抗菌薬（4-6週）；手術適応：弁破壊・難治・塞栓反復']},
    {id:'circ_aod',  label:'大動脈解離',     keys:['Stanford A型→緊急手術；B型→降圧薬（ICU管理）','突然の引き裂かれる痛み；血圧左右差','A型合併症：AR・心タンポ・冠動脈閉塞・脳虚血','Marfan・二尖弁・高血圧が背景']},
    {id:'circ_dvt',  label:'深部静脈血栓症', keys:['Virchow三徴；下肢腫脹・熱感・Homan徴候','D-dimer↑（感度高）；超音波圧迫試験（特異度高）','DOAC治療（リバーロキサバン等）；予防：早期離床','ネフローゼ・癌・長期臥床・経口避妊薬が危険因子']},
    {id:'circ_htn',  label:'高血圧',         keys:['≥140/90 mmHg；家庭血圧≥135/85','ARB/ACE-I・Ca拮抗薬・サイアザイド系','二次性高血圧：原発性アルドステロン症（最多）','高血圧緊急症：臓器障害合併→ニカルジピン静注']},
    {id:'circ_pah',  label:'肺高血圧',       keys:['mPAP≥25 mmHg（安静時）；右心カテ確定','PAH：ERA・PDE5阻害薬・プロスタサイクリン','COPD/間質性肺疾患→続発性PH→右心不全','右心不全：頸静脈怒張・肝腫大・下腿浮腫']},
  ]},
  {id:'resp',label:'呼吸器',icon:'🫁',color:'#0277BD',angle:0,href:'呼吸器/mindmap.html',diseases:[
    {id:'resp_copd', label:'COPD',           keys:['喫煙→気流制限（FEV1/FVC<0.70）；GOLD分類','LABA/LAMA/ICS；増悪：ステロイド+抗菌薬+NPPV','肺高血圧・右心不全・自然気胸・呼吸不全合併','禁煙が最重要（進行抑制）；肺リハ・在宅酸素']},
    {id:'resp_lc',   label:'肺癌',           keys:['腺癌（末梢型）・扁平上皮癌（中枢型）・SCLC','EGFR変異（腺癌）→オシメルチニブ；ALK転座→アレクチニブ','SCLC：EP療法＋PCI；予後不良','副腎転移（最多）・脳転移・骨転移・肝転移']},
    {id:'resp_tb',   label:'肺結核',         keys:['M. tuberculosis；飛沫核感染；空洞形成・上葉優位','IGRA（T-SPOT/QFN）；HRZE×2→HR×4か月','粟粒結核・結核性髄膜炎・結核性胸膜炎','DOTS；届出（2類感染症）；潜在性結核→INH予防内服']},
    {id:'resp_iip',  label:'間質性肺炎',     keys:['UIP/IPF：蜂巣肺；ピルフェニドン/ニンテダニブ','膠原病関連ILD（RA・SSc・PM/DM；抗Jo-1抗体）','急性増悪：6か月以内の急速悪化→高死亡率','KL-6・SP-D↑；HRCT：蜂巣肺・牽引性気管支拡張']},
    {id:'resp_pte',  label:'肺血栓塞栓症',  keys:['DVTからの血栓塞栓；胸痛・呼吸困難・頻脈・SpO₂↓','CT-PA（造影）が標準；D-dimer↑・ECHO：右心負荷','大量PTE（血行不安定）→血栓溶解療法','UFH急性期→DOAC長期；IVCフィルターは限定的']},
    {id:'resp_ards', label:'ARDS',           keys:['急性発症・両側浸潤影・P/F<300・非心原性','原因：敗血症（最多）・誤嚥・膵炎・DIC・輸血','肺保護換気（Vt 6 mL/kg・Pplat<30）・腹臥位','死亡率30-45%；多臓器不全に進展']},
    {id:'resp_pneu', label:'重症肺炎',       keys:['市中：肺炎球菌・レジオネラ；A-DROP/PSIスコア','院内：MRSA・緑膿菌；誤嚥性：嫌気性菌','ICU管理：敗血症・ARDS・膿胸・呼吸不全合併時','菌血症→敗血症性ショック→DIC合併']},
    {id:'resp_sarc', label:'サルコイドーシス',keys:['非乾酪性肉芽腫；BHL（両側肺門リンパ節腫脹）','高Ca血症（活性型VitD産生↑）・眼病変・皮膚病変・心病変','ACE値↑・sIL-2R↑；ガリウムシンチ/FDG-PET','無症状は経過観察；有症状/重症臓器病変→ステロイド']},
  ]},
  {id:'neur',label:'神経',icon:'🧠',color:'#1565C0',angle:45,href:'神経/mindmap.html',diseases:[
    {id:'neur_stroke',label:'脳梗塞',         keys:['心原性（AF）・アテローム血栓性・ラクナ','t-PA（4.5時間）・血栓回収（24時間）；NIHSS','DWI高信号+ADC低下=急性期梗塞','二次予防：AF→DOAC；非心原性→抗血小板薬']},
    {id:'neur_ich',  label:'脳出血・SAH',     keys:['高血圧性：被殻（最多）・視床・橋・小脳','SAH：今まで最悪の頭痛；CT→腰椎穿刺；動脈瘤クリッピング/コイル','脳血管攣縮（SAH4-14日）：Nimodipine','ICP管理：頭部挙上30°・マンニトール・過換気']},
    {id:'neur_pd',   label:'パーキンソン病',  keys:['安静時振戦・筋強剛・動作緩慢・姿勢反射障害','Lewy小体（α-syn）；黒質線条体ドパミン欠乏','L-dopa（第一選択）；wearing off/on-off→MAO-B阻害薬','誤嚥性肺炎・起立性低血圧・認知症（DLBへの連続性）']},
    {id:'neur_ad',   label:'Alzheimer病',     keys:['Aβ老人斑＋タウ；海馬から発症','記憶障害→見当識→BPSD→全介護','ChEI（ドネペジル）・レカネマブ（抗Aβ抗体）','誤嚥性肺炎・感染症が最終的な死因']},
    {id:'neur_ep',   label:'てんかん',        keys:['焦点性（focal）vs 全般性；脳腫瘍・脳梗塞後・代謝異常が二次性原因','重積状態：5分以上→ジアゼパム→ホスフェニトイン','CBZ→低Na血症（SIADH）；VPA→催奇形性','脳波（EEG）：棘波・鋭徐波複合で診断']},
    {id:'neur_gbs',  label:'ギラン・バレー症候群',keys:['上行性弛緩性麻痺；先行感染（カンピロ等）後1-3週','髄液：細胞蛋白解離；NCS：脱髄','IVIG（0.4g/kg×5日）or 血漿交換；ステロイド無効','自律神経障害・呼吸筋麻痺→ICU（人工呼吸）']},
    {id:'neur_mg',   label:'重症筋無力症',    keys:['抗AChR抗体（85%）or 抗MuSK抗体；NMJ障害','易疲労性（夕方増悪）；Edrophonium test','胸腺腫合併（15%）→胸腺摘除','MGクリーゼ：呼吸筋麻痺→血漿交換/IVIG＋ICU挿管']},
    {id:'neur_ms',   label:'多発性硬化症',    keys:['時間的・空間的多発；白質脱髄病変','視神経炎・横断性脊髄炎・INO（核間性眼筋麻痺）','急性期：ステロイドパルス；DMT：オクレリズマブ等','視神経脊髄炎（NMOSD）：抗AQP4抗体；β-IFN悪化']},
  ]},
  {id:'gi',label:'消化器',icon:'🫃',color:'#2E7D32',angle:90,href:'消化器/mindmap.html',diseases:[
    {id:'gi_uc',     label:'潰瘍性大腸炎',   keys:['直腸から連続性；びらん・浅潰瘍；粘血便','5-ASA→ステロイド→タクロリムス→抗TNF-α','中毒性巨大結腸症（緊急手術）；長期→大腸癌','PSC合併（UC患者の5%）：黄疸・肝酵素上昇']},
    {id:'gi_cd',     label:'クローン病',      keys:['非連続性・全層性；縦走潰瘍・敷石像・狭窄・瘻孔','回盲部好発；抗TNF-α（infliximab等）第一選択','腸管外合併症：関節炎・虹彩炎・壊疽性膿皮症','栄養療法（成分栄養）；短腸症候群・膿瘍・癌化']},
    {id:'gi_crc',    label:'大腸癌',          keys:['S状結腸・直腸が最多；Dukes/TNM；腺癌','EMR/ESD（T1a）；D3郭清付き外科切除','化学療法：FOLFOX/FOLFIRI＋Bev or Cet（RAS野生型）','同時性肝転移（20-30%）；腹膜播種；肺転移']},
    {id:'gi_gc',     label:'胃癌',            keys:['H. pylori・塩分；スキルス（4型）予後不良','EMR/ESD（T1a）；D2郭清付き胃切除','S-1±CDDP；HER2+→トラスツズマブ','腹膜播種（Krukenberg腫瘍）・Virchow転移']},

function deg(a){return a*Math.PI/180;}
const DIS_POS={},DIS_SUBJ_IDX={};
SUBJECTS.forEach((s,si)=>{
  const fan=Math.min(30,8+6*s.diseases.length);
  s.diseases.forEach((d,di)=>{
    DIS_SUBJ_IDX[d.id]=si;
    const a=deg(s.angle-fan/2+(di+0.5)*fan/s.diseases.length);
    DIS_POS[d.id]={x:CX+R2*Math.cos(a),y:CY+R2*Math.sin(a)};
  });
});

// Defs
function mkDefs(){
  const defs=ns('defs',{});
  const rg=ns('radialGradient',{id:'rootGrad',cx:'50%',cy:'50%',r:'50%'});
  rg.append(ns('stop',{offset:'0%','stop-color':'#FFD54F'}),ns('stop',{offset:'100%','stop-color':'#E65100'}));
  const glow=ns('filter',{id:'glow',x:'-50%',y:'-50%',width:'200%',height:'200%'});
  const gb=ns('feGaussianBlur',{stdDeviation:'5',result:'c'});
  const gm=ns('feMerge',{});gm.append(ns('feMergeNode',{in:'c'}),ns('feMergeNode',{in:'SourceGraphic'}));
  glow.append(gb,gm);
  const g2=ns('filter',{id:'glow2',x:'-50%',y:'-50%',width:'200%',height:'200%'});
  const gb2=ns('feGaussianBlur',{stdDeviation:'3',result:'c'});
  const gm2=ns('feMerge',{});gm2.append(ns('feMergeNode',{in:'c'}),ns('feMergeNode',{in:'SourceGraphic'}));
  g2.append(gb2,gm2);defs.append(rg,glow,g2);svgEl.prepend(defs);
}
mkDefs();

function anchor(x){return x<CX-20?'end':x>CX+20?'start':'middle';}
function splitLbl(l){if(l.length<=4)return[l];if(l.includes('・')){const p=l.split('・');return[p.slice(0,Math.ceil(p.length/2)).join('・'),p.slice(Math.ceil(p.length/2)).join('・')];}const m=Math.ceil(l.length/2);return[l.slice(0,m),l.slice(m)];}

function drawSubjects(){
  const defs=svgEl.querySelector('defs');
  SUBJECTS.forEach((s,si)=>{
    const a=deg(s.angle);
    const sx=CX+R1*Math.cos(a),sy=CY+R1*Math.sin(a);
    const ex=CX+50*Math.cos(a),ey=CY+50*Math.sin(a);
    lEdCh.append(ns('path',{d:`M ${ex} ${ey} Q ${(ex+sx)/2} ${(ey+sy)/2} ${sx} ${sy}`,fill:'none',stroke:s.color,'stroke-width':'2.5',opacity:'0.5'}));
    const g=ns('g',{transform:`translate(${sx},${sy})`,style:'cursor:pointer'});
    const outerR=ns('circle',{r:'44',fill:'none',stroke:s.color,'stroke-width':'2',opacity:'0.35'});
    const circ=ns('circle',{r:'36',fill:s.color,stroke:'rgba(255,255,255,0.3)','stroke-width':'1.5',filter:'url(#glow2)'});
    circ.style.transition='r 0.2s';
    const icon=ns('text',{x:'0',y:'-4','text-anchor':'middle','font-size':'16','font-family':'Noto Sans JP,sans-serif'});icon.textContent=s.icon;
    const lines=splitLbl(s.label);
    lines.forEach((ln,li)=>{
      const t=ns('text',{x:'0',y:String(8+li*11),'text-anchor':'middle','font-size':'8.5','font-weight':'700',fill:'#fff','font-family':'Noto Sans JP,sans-serif'});
      t.textContent=ln;g.append(t);
    });
    g.prepend(circ,outerR,icon);
    g.addEventListener('click',e=>{e.stopPropagation();toggleSubject(si);});
    g.addEventListener('touchstart',e=>{e.stopPropagation();if(e.touches.length===1){dragging=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;}},{passive:true});
    g.addEventListener('mouseenter',()=>circ.setAttribute('r','39'));
    g.addEventListener('mouseleave',()=>circ.setAttribute('r',activeSubjects.has(si)?'39':'36'));
    lNCh.append(g);

    // Disease nodes for this subject
    disEdges[si]=[];disNodes[si]=[];
    s.diseases.forEach((dis,di)=>{
      const dp=DIS_POS[dis.id];
      const NR=27;
      const edge=ns('path',{d:`M ${sx} ${sy} Q ${(sx+dp.x)/2} ${(sy+dp.y)/2} ${dp.x} ${dp.y}`,fill:'none',stroke:s.color,'stroke-width':'1.5',opacity:'0'});
      edge.style.transition='opacity 0.3s';lEdDis.append(edge);disEdges[si].push(edge);
      const dg=ns('g',{transform:`translate(${dp.x},${dp.y})`,style:'cursor:pointer',opacity:'0'});
      dg.style.transition='opacity 0.3s';
      const dc=ns('circle',{r:String(NR),fill:s.color,stroke:'rgba(255,255,255,0.3)','stroke-width':'1'});
      dc.style.transition='r 0.15s';
      function abbr(lbl){const m=lbl.match(/^([A-Z][A-Za-z0-9-]+)/);if(m&&m[1].length>=2&&m[1].length<=6)return m[1];return lbl.replace(/（.+?）/g,'').replace(/[・\/].+/,'').slice(0,4);}
      const dt=ns('text',{x:'0',y:'4','text-anchor':'middle','font-size':'9','font-weight':'900',fill:'#fff','font-family':'Noto Sans JP,sans-serif','pointer-events':'none'});dt.textContent=abbr(dis.label);
      const dx2=dp.x-CX,dy2=dp.y-CY,len2=Math.hypot(dx2,dy2)||1;
      const lx=(dx2/len2)*(NR+22),ly=(dy2/len2)*(NR+22);
      const shortLbl=dis.label.replace(/（.+?）/g,'').replace(/・.+/,'').trim();
      const lw=Math.min(shortLbl.length,9)*7.5+10;
      const lbg=ns('rect',{x:String(lx-(anchor(dp.x)==='end'?lw:anchor(dp.x)==='start'?0:lw/2)),y:String(ly-11),width:String(lw),height:'14',fill:'rgba(6,10,20,0.88)',rx:'4',opacity:'0','pointer-events':'none'});
      lbg.style.transition='opacity 0.15s';
      const lt=ns('text',{x:String(lx),y:String(ly+1),'text-anchor':anchor(dp.x),'font-size':'11','font-weight':'700',fill:'#fff','font-family':'Noto Sans JP,sans-serif','pointer-events':'none',opacity:'0'});
      lt.style.transition='opacity 0.15s';
      lt.textContent=shortLbl.length>9?shortLbl.slice(0,8)+'…':shortLbl;
      dg.append(dc,dt,lbg,lt);
      dg.addEventListener('click',e=>{e.stopPropagation();showPanel(si,di);});
      dg.addEventListener('touchstart',e=>{e.stopPropagation();if(e.touches.length===1){dragging=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;}},{passive:true});
      dg.addEventListener('mouseenter',()=>{dc.setAttribute('r',String(NR+3));lt.style.opacity='1';lbg.style.opacity='1';});
      dg.addEventListener('mouseleave',()=>{dc.setAttribute('r',String(NR));lt.style.opacity='0';lbg.style.opacity='0';});
      lNDis.append(dg);disNodes[si].push(dg);
    });
  });
}
drawSubjects();

// Relations
function drawRelations(){
  const defs=svgEl.querySelector('defs');
  CROSS.forEach(rel=>{
    const fp=DIS_POS[rel.f],tp=DIS_POS[rel.t];if(!fp||!tp)return;
    const mx=(fp.x+tp.x)/2,my=(fp.y+tp.y)/2;
    const cpx=mx+(CX-mx)*0.38,cpy=my+(CY-my)*0.38;
    const path=ns('path',{d:`M ${fp.x} ${fp.y} Q ${cpx} ${cpy} ${tp.x} ${tp.y}`,fill:'none',stroke:rel.c,'stroke-width':'1.8','stroke-dasharray':'6 4',opacity:'0'});
    path.style.transition='opacity 0.4s';lRel.append(path);rel._p=path;
    const lx=0.25*fp.x+0.5*cpx+0.25*tp.x,ly=0.25*fp.y+0.5*cpy+0.25*tp.y-8;
    if(rel.lb){
      const lw=rel.lb.length*6.5+8;
      const bg=ns('rect',{x:String(lx-lw/2),y:String(ly-10),width:String(lw),height:'13',fill:'#060a14',rx:'3',opacity:'0'});
      bg.style.transition='opacity 0.4s';
      const lt=ns('text',{x:String(lx),y:String(ly),'text-anchor':'middle','font-size':'8.5','font-weight':'700',fill:rel.c,'font-family':'Noto Sans JP,sans-serif',opacity:'0','pointer-events':'none'});
      lt.style.transition='opacity 0.4s';lt.textContent=rel.lb;
      lRel.append(bg,lt);rel._bg=bg;rel._lt=lt;
    }
  });
  SAME.forEach(rel=>{
    const fp=DIS_POS[rel.f],tp=DIS_POS[rel.t];if(!fp||!tp)return;
    const mx=(fp.x+tp.x)/2,my=(fp.y+tp.y)/2;
    const ox=mx-CX,oy=my-CY,ol=Math.hypot(ox,oy)||1;
    const cpx=mx+(ox/ol)*140,cpy=my+(oy/ol)*140;
    const path=ns('path',{d:`M ${fp.x} ${fp.y} Q ${cpx} ${cpy} ${tp.x} ${tp.y}`,fill:'none',stroke:rel.c,'stroke-width':'1.5','stroke-dasharray':'5 4',opacity:'0'});
    path.style.transition='opacity 0.4s';lSRel.append(path);rel._p=path;
  });
}
drawRelations();

function updateRelations(){
  CROSS.forEach(rel=>{
    const v=rel._p&&activeSubjects.has(DIS_SUBJ_IDX[rel.f])&&activeSubjects.has(DIS_SUBJ_IDX[rel.t]);
    if(rel._p)rel._p.style.opacity=v?'0.7':'0';
    if(rel._bg)rel._bg.style.opacity=v?'0.95':'0';
    if(rel._lt)rel._lt.style.opacity=v?'1':'0';
  });
  SAME.forEach(rel=>{
    const v=rel._p&&activeSubjects.has(DIS_SUBJ_IDX[rel.f]);
    if(rel._p)rel._p.style.opacity=v?'0.65':'0';
    if(rel._bg)rel._bg.style.opacity=v?'0.95':'0';
    if(rel._lt)rel._lt.style.opacity=v?'1':'0';
  });
}

function toggleSubject(si){
  const chG=lNCh.children[si];
  const circ=chG?chG.querySelector('circle'):null;
  if(activeSubjects.has(si)){
    activeSubjects.delete(si);
    disNodes[si].forEach(n=>{n.style.opacity='0';n.style.pointerEvents='none';});
    disEdges[si].forEach(e=>e.style.opacity='0');
    if(circ)circ.setAttribute('r','36');
  }else{
    activeSubjects.add(si);
    disNodes[si].forEach(n=>{n.style.opacity='1';n.style.pointerEvents='';});
    disEdges[si].forEach(e=>e.style.opacity='0.45');
    if(circ)circ.setAttribute('r','39');
    const a=deg(SUBJECTS[si].angle);
    panTo(CX+R1*Math.cos(a),CY+R1*Math.sin(a));
  }
  updateLegend();
  updateRelations();
}

// Legend
function buildLegend(){
  const leg=document.getElementById('legend');
  SUBJECTS.forEach((s,si)=>{
    const item=document.createElement('div');
    item.className='legend-item';item.dataset.si=si;
    item.innerHTML=`<div class="legend-dot" style="background:${s.color}"></div><span>${s.icon} ${s.label}</span>`;
    item.addEventListener('click',()=>toggleSubject(si));
    leg.append(item);
  });
  const sep=document.createElement('div');sep.className='legend-sep';leg.append(sep);
  const r1=document.createElement('div');r1.className='legend-item';r1.style.cursor='default';
  r1.innerHTML=`<div class="legend-dash" style="border-color:#FBBF24"></div><span style="font-size:9px">科目横断リンク</span>`;
  const r2=document.createElement('div');r2.className='legend-item';r2.style.cursor='default';
  r2.innerHTML=`<div class="legend-dash" style="border-color:rgba(255,255,255,0.4)"></div><span style="font-size:9px">同科目内リンク</span>`;
  leg.append(r1,r2);
}
function updateLegend(){
  document.querySelectorAll('#legend .legend-item[data-si]').forEach(el=>{
    const si=parseInt(el.dataset.si);
    el.classList.toggle('active-subj',activeSubjects.has(si));
  });
}
buildLegend();

// Panel
function showPanel(si,di){
  const s=SUBJECTS[si],dis=s.diseases[di];
  document.getElementById('panelSubj').textContent=s.icon+' '+s.label;
  document.getElementById('panelSubj').style.background=s.color;
  document.getElementById('panelSubj').style.color='#fff';
  document.getElementById('panelTitle').textContent=dis.label;
  const ul=document.getElementById('panelKeys');ul.innerHTML='';
  dis.keys.forEach(k=>{const li=document.createElement('li');li.textContent=k;ul.append(li);});
  document.getElementById('panelLink').href=s.href;
  document.getElementById('panel').classList.add('show');
}
function hidePanel(){document.getElementById('panel').classList.remove('show');}
document.getElementById('panelClose').addEventListener('click',hidePanel);
svgEl.addEventListener('click',hidePanel);
document.getElementById('lb').addEventListener('click',()=>document.getElementById('lb').classList.remove('open'));

// All/None buttons
document.getElementById('btnAll').addEventListener('click',()=>{
  SUBJECTS.forEach((_,si)=>{if(!activeSubjects.has(si))toggleSubject(si);});
});
document.getElementById('btnNone').addEventListener('click',()=>{
  [...activeSubjects].forEach(si=>toggleSubject(si));
});

// Pan/zoom
const wrap=document.getElementById('wrap'),inner=document.getElementById('inner');
let tx=0,ty=0,scale=0.72,dragging=false,lastX=0,lastY=0,lastDist=0;
function clampAndApply(){scale=Math.max(0.3,Math.min(3,scale));inner.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;}
window.addEventListener('load',()=>{
  const ww=wrap.offsetWidth,wh=wrap.offsetHeight;
  tx=(ww-W*scale)/2;ty=(wh-H*scale)/2;clampAndApply();
});
wrap.addEventListener('mousedown',e=>{dragging=true;lastX=e.clientX;lastY=e.clientY;e.preventDefault();});
window.addEventListener('mousemove',e=>{if(!dragging)return;tx+=e.clientX-lastX;ty+=e.clientY-lastY;lastX=e.clientX;lastY=e.clientY;clampAndApply();});
window.addEventListener('mouseup',()=>{dragging=false;});
wrap.addEventListener('wheel',e=>{e.preventDefault();const f=e.deltaY>0?0.9:1.1;const r=wrap.getBoundingClientRect();const mx=e.clientX-r.left,my=e.clientY-r.top;tx=mx-(mx-tx)*f;ty=my-(my-ty)*f;scale*=f;clampAndApply();},{passive:false});
wrap.addEventListener('touchstart',e=>{if(e.touches.length===1){dragging=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;}else if(e.touches.length===2){dragging=false;lastDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}e.preventDefault();},{passive:false});
wrap.addEventListener('touchmove',e=>{if(e.touches.length===1&&dragging){tx+=e.touches[0].clientX-lastX;ty+=e.touches[0].clientY-lastY;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;clampAndApply();}else if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);const r=wrap.getBoundingClientRect();const mx=(e.touches[0].clientX+e.touches[1].clientX)/2-r.left,my=(e.touches[0].clientY+e.touches[1].clientY)/2-r.top;const f=d/lastDist;tx=mx-(mx-tx)*f;ty=my-(my-ty)*f;scale*=f;lastDist=d;clampAndApply();}e.preventDefault();},{passive:false});
wrap.addEventListener('touchend',()=>{dragging=false;});

function panTo(px,py,dur=480){
  const ww=wrap.offsetWidth,wh=wrap.offsetHeight;
  const ttx=ww/2-px*scale,tty=wh/2-py*scale;
  const stx=tx,sty=ty,t0=performance.now();
  function step(now){const p=Math.min((now-t0)/dur,1),e=1-Math.pow(1-p,3);tx=stx+(ttx-stx)*e;ty=sty+(tty-sty)*e;clampAndApply();if(p<1)requestAnimationFrame(step);}
  requestAnimationFrame(step);
}

window.addEventListener('resize',()=>{const ww=wrap.offsetWidth,wh=wrap.offsetHeight;tx=(ww-W*scale)/2;ty=(wh-H*scale)/2;clampAndApply();});

const style=document.createElement('style');
style.textContent='@keyframes pulse{0%,100%{opacity:0.5;transform:scale(1);}50%{opacity:0.12;transform:scale(1.2);}}';
document.head.append(style);
</script>
