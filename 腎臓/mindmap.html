  ch.diseases.forEach(dis => { DIS_CHIDX[dis.id] = ci; });
});

function deg(a) { return a * Math.PI / 180; }
function chPos(chIdx) {
  const a = deg(CHAPTERS[chIdx].angle);
  return { x: CX + R1 * Math.cos(a), y: CY + R1 * Math.sin(a) };
}
function disPos(chIdx, dIdx, total) {
  const chAngle = CHAPTERS[chIdx].angle;
  const fanDeg = Math.min(36, 8 + 6 * total);
  const start = chAngle - fanDeg / 2;
  const a = deg(start + (dIdx + 0.5) * fanDeg / total);
  return { x: CX + R2 * Math.cos(a), y: CY + R2 * Math.sin(a) };
}
function anchor(x) {
  if (x < CX - 20) return 'end';
  if (x > CX + 20) return 'start';
  return 'middle';
}

const svgEl = document.getElementById('svg');
const W = 1600, H = 1380;
svgEl.setAttribute('width', W);
svgEl.setAttribute('height', H);
svgEl.setAttribute('viewBox', `0 0 ${W} ${H}`);

function svgNS(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
  return el;
}

function createDefs() {
  const defs = svgNS('defs', {});
  const rg = svgNS('radialGradient', { id:'rootGrad', cx:'50%', cy:'50%', r:'50%' });
  rg.append(
    svgNS('stop', { offset:'0%', 'stop-color':'#42A5F5' }),
    svgNS('stop', { offset:'100%', 'stop-color':'#0D47A1' })
  );
  const f = svgNS('filter', { id:'glow', x:'-50%', y:'-50%', width:'200%', height:'200%' });
  const blur = svgNS('feGaussianBlur', { stdDeviation:'4', result:'colored' });
  const merge = svgNS('feMerge', {});
  merge.append(svgNS('feMergeNode', { in:'colored' }), svgNS('feMergeNode', { in:'SourceGraphic' }));
  f.append(blur, merge);
  const f2 = svgNS('filter', { id:'glow2', x:'-50%', y:'-50%', width:'200%', height:'200%' });
  const blur2 = svgNS('feGaussianBlur', { stdDeviation:'2.5', result:'colored2' });
  const merge2 = svgNS('feMerge', {});
  merge2.append(svgNS('feMergeNode',{in:'colored2'}), svgNS('feMergeNode',{in:'SourceGraphic'}));
  f2.append(blur2, merge2);
  defs.append(rg, f, f2);
  svgEl.prepend(defs);
}

const layerEdgesCh  = svgNS('g', { id:'ech' });
const layerEdgesDis = svgNS('g', { id:'edis' });
const layerRelations= svgNS('g', { id:'nrel' });
const layerNodesDis = svgNS('g', { id:'ndis' });
const layerNodesCh  = svgNS('g', { id:'nch' });
const layerRoot     = svgNS('g', { id:'nroot' });
svgEl.append(layerEdgesCh, layerEdgesDis, layerRelations, layerNodesDis, layerNodesCh, layerRoot);
createDefs();

const activeChapters = new Set();
const disEdges = {};
const disNodes = {};

function drawRoot() {
  const g = svgNS('g', { transform: `translate(${CX},${CY})` });
  const ring = svgNS('circle', { r:'68', fill:'none', stroke:'rgba(25,118,210,0.25)', 'stroke-width':'12' });
  ring.style.animation = 'pulse 2.5s ease-in-out infinite';
  const ring2 = svgNS('circle', { r:'52', fill:'none', stroke:'rgba(25,118,210,0.18)', 'stroke-width':'8' });
  ring2.style.animation = 'pulse 2.5s ease-in-out infinite 0.8s';
  const circ = svgNS('circle', { r:'42', fill:'url(#rootGrad)', filter:'url(#glow)' });
  const txt1 = svgNS('text', { x:'0', y:'-4', 'text-anchor':'middle', 'font-size':'22', 'font-weight':'900', fill:'#fff', 'font-family':'Noto Sans JP,sans-serif' });
  txt1.textContent = '💧';
  const txt2 = svgNS('text', { x:'0', y:'14', 'text-anchor':'middle', 'font-size':'11', 'font-weight':'900', fill:'#fff', 'font-family':'Noto Sans JP,sans-serif', 'letter-spacing':'0.05em' });
  txt2.textContent = '腎臓';
  g.append(ring, ring2, circ, txt1, txt2);
  layerRoot.append(g);
}

function drawChapters() {
  CHAPTERS.forEach((ch, ci) => {
    const p = chPos(ci);
    const ep1 = { x: CX + 44 * Math.cos(deg(ch.angle)), y: CY + 44 * Math.sin(deg(ch.angle)) };
    const path = svgNS('path', {
      d: `M ${ep1.x} ${ep1.y} Q ${(ep1.x+p.x)/2} ${(ep1.y+p.y)/2} ${p.x} ${p.y}`,
      fill: 'none', stroke: ch.color, 'stroke-width': '2.5', opacity: '0.55'
    });
    layerEdgesCh.append(path);
    const g = svgNS('g', { transform: `translate(${p.x},${p.y})`, style:'cursor:pointer' });
    g.dataset.ci = ci;
    const outerRing = svgNS('circle', { r:'37', fill:'none', stroke: ch.color, 'stroke-width':'2', opacity:'0.4' });
    const circ = svgNS('circle', { r:'31', fill: ch.color, 'stroke': '#fff', 'stroke-width': '1.5', filter:'url(#glow2)' });
    circ.style.transition = 'r 0.2s, filter 0.2s';
    function splitLabel(lbl) {
      if (lbl.length <= 5) return [lbl];
      const parts = lbl.split('・');
      if (parts.length >= 2) return [parts.slice(0,Math.ceil(parts.length/2)).join('・'), parts.slice(Math.ceil(parts.length/2)).join('・')];
      const mid = Math.ceil(lbl.length / 2);
      return [lbl.slice(0, mid), lbl.slice(mid)];
    }
    const lines = splitLabel(ch.label);
    const lineH = 12;
    const totalH = lines.length * lineH;
    lines.forEach((line, li) => {
      const t = svgNS('text', { x:'0', y: String(li * lineH - totalH/2 + lineH*0.8), 'text-anchor':'middle', 'font-size':'9', 'font-weight':'700', fill:'#fff', 'font-family':'Noto Sans JP,sans-serif' });
      t.textContent = line;
      g.append(t);
    });
    g.prepend(circ, outerRing);
    g.addEventListener('click', (e) => { e.stopPropagation(); toggleChapter(ci); });
    g.addEventListener('touchstart',(e)=>{e.stopPropagation();if(e.touches.length===1){dragging=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;}},{passive:true});
    g.addEventListener('mouseenter', () => { circ.setAttribute('r', '34'); });
    g.addEventListener('mouseleave', () => { circ.setAttribute('r', activeChapters.has(ci) ? '34' : '31'); });
    layerNodesCh.append(g);
  });
}

function drawDiseases() {
  const defs = svgEl.querySelector('defs');
  CHAPTERS.forEach((ch, ci) => {
    const cp = chPos(ci);
    disEdges[ci] = [];
    disNodes[ci] = [];
    ch.diseases.forEach((dis, di) => {
      const dp = disPos(ci, di, ch.diseases.length);
      DIS_POS[dis.id] = dp;
      const chColor = ch.color;
      const hasImg = dis.imgs && dis.imgs.length > 0;
      const nodeR = 32;
      const edge = svgNS('path', {
        d: `M ${cp.x} ${cp.y} Q ${(cp.x+dp.x)/2} ${(cp.y+dp.y)/2} ${dp.x} ${dp.y}`,
        fill: 'none', stroke: chColor, 'stroke-width': '1.5', opacity: '0'
      });
      edge.style.transition = 'opacity 0.35s';
      layerEdgesDis.append(edge);
      disEdges[ci].push(edge);
      const g = svgNS('g', { transform: `translate(${dp.x},${dp.y})`, style:'cursor:pointer', opacity:'0' });
      g.style.transition = 'opacity 0.35s';
      g.dataset.ci = ci; g.dataset.di = di;
      if (hasImg) {
        const clipId = `clip-${dis.id}`;
        const cp2 = svgNS('clipPath', { id: clipId });
        cp2.append(svgNS('circle', { cx:'0', cy:'0', r: String(nodeR) }));
        defs.append(cp2);
        const imgEl = svgNS('image', { href: dis.imgs[0], x: String(-nodeR), y: String(-nodeR), width: String(nodeR*2), height: String(nodeR*2), 'clip-path': `url(#${clipId})`, preserveAspectRatio: 'xMidYMid slice' });
        const ring = svgNS('circle', { r: String(nodeR), fill:'none', stroke: chColor, 'stroke-width':'2.5', opacity:'0.9' });
        ring.style.transition = 'r 0.15s';
        g.append(imgEl, ring);
      } else {
        const circ = svgNS('circle', { r: String(nodeR), fill: chColor, stroke:'rgba(255,255,255,0.35)', 'stroke-width':'1' });
        circ.style.transition = 'r 0.15s';
        function getAbbr(label) {
          const m = label.match(/^([A-Za-z0-9\-]+)/);
          if (m && m[1].length >= 2 && m[1].length <= 6) return m[1];
          return label.replace(/（.+?）/g, '').slice(0, 4);
        }
        const ct = svgNS('text', { x:'0', y:'5', 'text-anchor':'middle', 'font-size':'10', 'font-weight':'900', fill:'#fff', 'font-family':'Noto Sans JP,sans-serif', 'pointer-events':'none' });
        ct.textContent = getAbbr(dis.label);
        g.append(circ, ct);
      }
      const dx = dp.x - CX, dy = dp.y - CY;
      const len = Math.hypot(dx, dy) || 1;
      const nx = dx / len, ny = dy / len;
      const lx = nx * (nodeR + 20), ly = ny * (nodeR + 20);
      function getExtLabel(label) {
        const noParens = label.replace(/（.+?）/g, '').replace(/\/.+/, '').trim();
        return noParens.length > 8 ? noParens.slice(0, 7) + '…' : noParens;
      }
      const lt = svgNS('text', { x: String(lx), y: String(ly + 4), 'text-anchor': anchor(dp.x), 'font-size':'12', 'font-weight':'700', fill:'rgba(255,255,255,0.9)', 'font-family':'Noto Sans JP,sans-serif', 'pointer-events':'none' });
      lt.textContent = getExtLabel(dis.label);
      g.append(lt);
      g.addEventListener('click', (e) => { e.stopPropagation(); showPanel(ci, di); });
      g.addEventListener('touchstart',(e)=>{e.stopPropagation();if(e.touches.length===1){dragging=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;}},{passive:true});
      g.addEventListener('mouseenter', () => { const c = g.querySelector('circle'); if(c) c.setAttribute('r', String(nodeR+4)); });
      g.addEventListener('mouseleave', () => { const c = g.querySelector('circle'); if(c) c.setAttribute('r', String(nodeR)); });
      layerNodesDis.append(g);
      disNodes[ci].push(g);
    });
  });
}

function drawRelations() {
  RELATIONS.forEach(rel => {
    const fp = DIS_POS[rel.from], tp = DIS_POS[rel.to];
    if (!fp || !tp) return;
    const mx = (fp.x+tp.x)/2, my = (fp.y+tp.y)/2;
    const isSameCh = DIS_CHIDX[rel.from] === DIS_CHIDX[rel.to];
    let cpx, cpy;
    if (isSameCh) {
      const outX=mx-CX, outY=my-CY, outLen=Math.hypot(outX,outY)||1;
      cpx=mx+(outX/outLen)*130; cpy=my+(outY/outLen)*130;
    } else {
      cpx=mx+(CX-mx)*0.35; cpy=my+(CY-my)*0.35;
    }
    const path = svgNS('path', { d:`M ${fp.x} ${fp.y} Q ${cpx} ${cpy} ${tp.x} ${tp.y}`, fill:'none', stroke:rel.color, 'stroke-width':'1.5', 'stroke-dasharray':'5 4', opacity:'0' });
    path.style.transition = 'opacity 0.4s';
    layerRelations.append(path);
    rel._path = path;
    if (!isSameCh) {
      const lx=0.25*fp.x+0.5*cpx+0.25*tp.x, ly=0.25*fp.y+0.5*cpy+0.25*tp.y-7;
      const labelW=rel.label.length*7+10;
      const bg = svgNS('rect', { x:String(lx-labelW/2), y:String(ly-10), width:String(labelW), height:'14', fill:'#06101f', rx:'4', opacity:'0' });
      bg.style.transition='opacity 0.4s';
      const lt = svgNS('text', { x:String(lx), y:String(ly), 'text-anchor':'middle', 'font-size':'9', 'font-weight':'700', fill:rel.color, 'font-family':'Noto Sans JP,sans-serif', opacity:'0', 'pointer-events':'none' });
      lt.style.transition='opacity 0.4s';
      lt.textContent=rel.label;
      layerRelations.append(bg, lt);
      rel._bg=bg; rel._label=lt;
    }
  });
}

function updateRelations() {
  RELATIONS.forEach(rel => {
    if (!rel._path) return;
    const vis = activeChapters.has(DIS_CHIDX[rel.from]) && activeChapters.has(DIS_CHIDX[rel.to]);
    rel._path.style.opacity = vis ? '0.75' : '0';
    if (rel._bg) rel._bg.style.opacity = vis ? '0.92' : '0';
    if (rel._label) rel._label.style.opacity = vis ? '1' : '0';
  });
}

function toggleChapter(ci) {
  const chG = layerNodesCh.children[ci];
  const circ = chG ? chG.querySelector('circle') : null;
  if (activeChapters.has(ci)) {
    activeChapters.delete(ci);
    disNodes[ci].forEach(n => { n.style.opacity='0'; n.style.pointerEvents='none'; });
    disEdges[ci].forEach(e => { e.style.opacity='0'; });
    if (circ) circ.setAttribute('r','31');
  } else {
    activeChapters.add(ci);
    disNodes[ci].forEach(n => { n.style.opacity='1'; n.style.pointerEvents=''; });
    disEdges[ci].forEach(e => { e.style.opacity='0.5'; });
    if (circ) circ.setAttribute('r','34');
    const p = chPos(ci);
    panTo(p.x, p.y);
  }
  updateRelations();
}

function panTo(px, py, duration=480) {
  const ww=wrap.offsetWidth, wh=wrap.offsetHeight;
  const targetTx=ww/2-px*scale, targetTy=wh/2-py*scale;
  const startTx=tx, startTy=ty, startTime=performance.now();
  function step(now) {
    const prog=Math.min((now-startTime)/duration,1);
    const ease=1-Math.pow(1-prog,3);
    tx=startTx+(targetTx-startTx)*ease;
    ty=startTy+(targetTy-startTy)*ease;
    clampAndApply();
    if(prog<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function showPanel(ci, di) {
  const ch=CHAPTERS[ci], dis=ch.diseases[di];
  document.getElementById('panelCh').textContent='📌 '+ch.label;
  document.getElementById('panelCh').style.background=ch.color;
  document.getElementById('panelCh').style.color='#fff';
  document.getElementById('panelTitle').textContent=dis.label;
  const ul=document.getElementById('panelKeys');
  ul.innerHTML='';
  dis.keys.forEach(k => { const li=document.createElement('li'); li.textContent=k; ul.append(li); });
  const imgWrap=document.getElementById('panelImgs');
  imgWrap.innerHTML='';
  if (dis.imgs && dis.imgs.length>0) {
    dis.imgs.forEach(src => { const im=document.createElement('img'); im.src=src; im.alt=dis.label; im.addEventListener('click',()=>openLightbox(src)); imgWrap.append(im); });
  }
  document.getElementById('panelLink').href=ch.link;
  document.getElementById('panel').classList.add('show');
}
function hidePanel() { document.getElementById('panel').classList.remove('show'); }
function openLightbox(src) { document.getElementById('lbImg').src=src; document.getElementById('lb').classList.add('open'); }
document.getElementById('lb').addEventListener('click', () => document.getElementById('lb').classList.remove('open'));
document.getElementById('panelClose').addEventListener('click', hidePanel);
svgEl.addEventListener('click', () => hidePanel());

const wrap=document.getElementById('wrap'), inner=document.getElementById('inner');
let tx=0, ty=0, scale=1, dragging=false, lastX=0, lastY=0, lastDist=0;

function clampAndApply() {
  scale=Math.max(0.4,Math.min(2.5,scale));
  inner.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
}
window.addEventListener('load', () => {
  const ww=wrap.offsetWidth, wh=wrap.offsetHeight;
  tx=(ww-W*scale)/2; ty=(wh-H*scale)/2; clampAndApply();
});
wrap.addEventListener('mousedown', e => { dragging=true; lastX=e.clientX; lastY=e.clientY; e.preventDefault(); });
window.addEventListener('mousemove', e => { if(!dragging)return; tx+=e.clientX-lastX; ty+=e.clientY-lastY; lastX=e.clientX; lastY=e.clientY; clampAndApply(); });
window.addEventListener('mouseup', () => { dragging=false; });
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const factor=e.deltaY>0?0.9:1.1;
  const rect=wrap.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  tx=mx-(mx-tx)*factor; ty=my-(my-ty)*factor; scale*=factor; clampAndApply();
}, { passive:false });
wrap.addEventListener('touchstart', e => {
  if(e.touches.length===1){dragging=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;}
  else if(e.touches.length===2){dragging=false;lastDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
  e.preventDefault();
},{passive:false});
wrap.addEventListener('touchmove', e => {
  if(e.touches.length===1&&dragging){tx+=e.touches[0].clientX-lastX;ty+=e.touches[0].clientY-lastY;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;clampAndApply();}
  else if(e.touches.length===2){
    const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const rect=wrap.getBoundingClientRect();
    const mx=(e.touches[0].clientX+e.touches[1].clientX)/2-rect.left;
    const my=(e.touches[0].clientY+e.touches[1].clientY)/2-rect.top;
    const factor=dist/lastDist;
    tx=mx-(mx-tx)*factor; ty=my-(my-ty)*factor; scale*=factor; lastDist=dist; clampAndApply();
  }
  e.preventDefault();
},{passive:false});
wrap.addEventListener('touchend', () => { dragging=false; });

function drawBg() {
  const g=svgNS('g',{opacity:'0.04'});
  for(let x=0;x<=W;x+=80) g.append(svgNS('line',{x1:x,y1:0,x2:x,y2:H,stroke:'#fff','stroke-width':'0.5'}));
  for(let y=0;y<=H;y+=80) g.append(svgNS('line',{x1:0,y1:y,x2:W,y2:y,stroke:'#fff','stroke-width':'0.5'}));
  svgEl.prepend(g);
  const gc=svgNS('g',{opacity:'0.05'});
  [R1+20,R2-20,R2+50].forEach(r => gc.append(svgNS('circle',{cx:CX,cy:CY,r:r,fill:'none',stroke:'#fff','stroke-width':'1','stroke-dasharray':'4 8'})));
  layerEdgesCh.before(gc);
}

const style=document.createElement('style');
style.textContent=`@keyframes pulse{0%,100%{opacity:0.6;transform:scale(1);}50%{opacity:0.15;transform:scale(1.15);}}`;
document.head.append(style);

drawBg(); drawRoot(); drawChapters(); drawDiseases(); drawRelations();
window.addEventListener('resize', () => { const ww=wrap.offsetWidth,wh=wrap.offsetHeight; tx=(ww-W*scale)/2; ty=(wh-H*scale)/2; clampAndApply(); });
</script>
</body>
</html>
