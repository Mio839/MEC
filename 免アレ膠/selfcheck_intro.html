<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>免疫・アレルギー・膠原病 Introduction セルフチェック（30問）</title>
<script src="../progress.js?v=3"></script>
<style>
:root{--or:#00838F;--nv:#1C2E4A;--gr:#2D8C4E;--grl:#EAF7EE;--gb:#F4F6F8;--cb:#FFF;--bd:#E0E5EB;--tx:#1A2332;--ts:#5A6475;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Noto Sans JP','Helvetica Neue',sans-serif;background:var(--gb);color:var(--tx);font-size:14px;line-height:1.7;}
.hdr{background:var(--nv);color:#fff;padding:10px 12px 8px;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.3);}
.hdr-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.hdr-title{font-size:15px;font-weight:800;}
.hub-link{font-size:11px;color:rgba(255,255,255,.7);text-decoration:none;padding:3px 10px;border:1px solid rgba(255,255,255,.3);border-radius:20px;white-space:nowrap;}
.mec-sync-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700;background:rgba(255,255,255,.15);color:#fff;margin-left:auto;}
.hdr-stats{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;}
.hdr-stat{background:rgba(255,255,255,.12);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;}
.hdr-stat span{color:#F5A623;}
.filter-row{display:flex;align-items:center;gap:3px;overflow-x:auto;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}
.nb{flex-shrink:0;background:none;border:1.5px solid rgba(255,255,255,.3);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;color:rgba(255,255,255,.65);transition:all .15s;white-space:nowrap;}
.nb.on{background:rgba(255,255,255,.2);border-color:#fff;color:#fff;}
.nb[data-state="flag"].on{background:#C0392B;border-color:#C0392B;}
.nb[data-state="undone"].on{background:#78909C;border-color:#78909C;}
.nb[data-state="done"].on{background:#2D8C4E;border-color:#2D8C4E;}
.vis-count{margin-left:auto;font-size:11px;font-weight:700;color:rgba(255,255,255,.55);white-space:nowrap;flex-shrink:0;}
.ct{max-width:900px;margin:0 auto;padding:14px 12px 60px;}
.sc-card{background:var(--cb);border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.07);margin-bottom:12px;border-left:4px solid var(--or);overflow:hidden;}
.sc-head{display:flex;align-items:center;gap:8px;padding:10px 15px 8px;border-bottom:1px solid var(--gb);}
.sc-num{font-size:14px;font-weight:900;color:var(--nv);min-width:32px;}
.sc-controls{display:flex;align-items:center;gap:5px;margin-left:auto;}
.mec-flag-btn{background:none;border:none;font-size:16px;cursor:pointer;opacity:.3;padding:0 2px;line-height:1;transition:opacity .2s;}
.mec-flag-btn.mec-flagged{opacity:1;}
.mec-lap-btn{padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;border:1.5px solid #E0E5EB;color:#A0AAB8;background:none;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap;}
.mec-lap-btn.mec-lapped{background:#2D8C4E;border-color:#2D8C4E;color:#fff;}
.mec-lap-num{font-size:9px;margin-left:2px;}
.sc-body{padding:12px 15px 14px;}
.sc-question{font-size:13.5px;line-height:1.75;margin-bottom:10px;font-weight:600;color:var(--nv);}
.sc-reveal-btn{display:block;width:100%;padding:8px;background:var(--gb);border:1.5px dashed var(--bd);border-radius:8px;font-size:12px;font-weight:700;color:var(--ts);cursor:pointer;font-family:inherit;transition:all .2s;text-align:center;}
.sc-reveal-btn:hover{background:#E8ECF0;}
.sc-reveal-btn.revealed{background:var(--grl);border-color:#A5D6A7;color:var(--gr);}
.sc-answer{display:none;margin-top:10px;background:var(--grl);border:1.5px solid #A5D6A7;border-radius:8px;padding:10px 13px;font-size:13px;line-height:1.8;color:#1A3828;}
.sc-answer.open{display:block;}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-row">
    <span class="hdr-title">🦠 免疫・アレルギー・膠原病 Introduction セルフチェック</span>
    <a class="hub-link" href="../index.html">← ハブへ</a>
    <span class="mec-sync-badge">⚙️ 未設定</span>
  </div>
  <div class="hdr-stats">
    <div class="hdr-stat">済 <span id="statDone">0</span>問</div>
    <div class="hdr-stat">合計 <span style="color:#F5A623">30</span>問</div>
  </div>
  <div class="filter-row">
    <button class="nb on" data-state="all" onclick="setState('all')">すべて</button>
    <button class="nb" data-state="flag" onclick="setState('flag')">🚩 赤旗</button>
    <button class="nb" data-state="undone" onclick="setState('undone')">未済</button>
    <button class="nb" data-state="done" onclick="setState('done')">済み</button>
    <span class="vis-count" id="visCount">—</span>
  </div>
</header>

<div class="ct" id="cards"></div>

<script>
const QA = [
  {q:"全身性エリテマトーデスSLE において予後に影響する臓器障害を2つ挙げよ。",a:"ループス腎炎、中枢神経ループス"},
  {q:"線維筋痛症でみられる特徴的な所見を答えよ。",a:"広範囲にわたる左右対称の圧痛点が存在する。"},
  {q:"全身性強皮症でみられる代表的な内臓病変を3つ挙げよ。",a:"間質性肺炎、肺高血圧症、強皮症腎クリーゼ"},
  {q:"関節リウマチでみられる体軸関節の障害を挙げよ。",a:"環軸関節亜脱臼"},
  {q:"若年女性に好発する、大動脈瘤や大動脈解離の原因となる代表的な疾患を挙げよ。",a:"高安動脈炎"},
  {q:"全身性エリテマトーデスSLE におけるCRP の特徴を答えよ。",a:"赤沈は上昇する一方で、CRP は軽度上昇にとどまることが多い。"},
  {q:"抗MDA5抗体陽性の皮膚筋炎（CADM）と特に関連が深い皮疹を答えよ。",a:"逆Gottron徴候"},
  {q:"中高年以降の難治性中耳炎・鼻炎で鑑別にあげるべき疾患を答えよ。",a:"多発血管炎性肉芽腫症GPA"},
  {q:"関節リウマチの関節外病変を3つ挙げよ。",a:"間質性肺炎、リウマトイド結節、胸膜炎、膜性腎症など"},
  {q:"Behçet病と相関するHLA を答えよ。",a:"HLA-B51"},
  {q:"リウマチ性多発筋痛症PMR において注意すべき症候を答えよ。",a:"側頭動脈炎（巨細胞性動脈炎）に伴う視力低下・失明"},
  {q:"MPO-ANCA陽性となる代表的な疾患を2つ挙げよ。",a:"顕微鏡的多発血管炎MPA、好酸球性多発血管炎性肉芽腫症EGPA"},
  {q:"ぶどう膜炎をきたす代表的な疾患を3つ挙げよ。",a:"サルコイドーシス、Behçet病、Vogt-小柳-原田病など"},
  {q:"感染症をのぞき、肉芽腫性疾患を5つ挙げよ。",a:"Crohn病、サルコイドーシス、過敏性肺炎、一部の血管炎（GCA、GPA、EGPA）、霰粒腫など"},
  {q:"間質性肺炎をきたす代表的な膠原病を3つ挙げよ。",a:"全身性強皮症SSc、多発性筋炎/皮膚筋炎PM/DM、関節リウマチRA"},
  {q:"多発性筋炎・皮膚筋炎PM/DM において、悪性腫瘍の合併と関連が強い抗体を答えよ。",a:"抗TIF1-γ抗体"},
  {q:"混合性結合組織病MCTD において死因の多くを占める内臓病変を答えよ。",a:"肺高血圧症"},
  {q:"IgG4関連疾患でみられる代表的な病変を4つ挙げよ。",a:"自己免疫性膵炎、唾液腺炎（Mikulicz病）、後腹膜線維症、肥厚性硬膜炎、間質性腎炎など"},
  {q:"Behçet病の主症状を4つ挙げよ。",a:"口腔内アフタ性潰瘍、外陰部潰瘍、皮膚症状（結節性紅斑など）、眼症状（ぶどう膜炎）"},
  {q:"脊椎関節炎と相関するHLA を答えよ。",a:"HLA-B27"},
  {q:"多発性筋炎・皮膚筋炎PM/DM でみられる代表的な皮疹を3つ答えよ。",a:"ヘリオトロープ疹、Gottron徴候・丘疹、逆Gottron徴候、機械工の手、ショールサイン、多形皮膚萎縮など"},
  {q:"抗リン脂質抗体症候群における、臨床像に反する特徴的な血液検査所見を答えよ。",a:"APTT延長（実際には血栓傾向を示す疾患なのでparadoxical）"},
  {q:"不明熱の主な鑑別疾患を挙げよ。",a:"膠原病、感染症（特に結核、感染性心内膜炎など）、悪性腫瘍（特にリンパ腫）、自己炎症性疾患、薬剤性など"},
  {q:"全身性エリテマトーデスSLE の病勢を反映する抗体を答えよ。",a:"抗dsDNA抗体"},
  {q:"抗SS-A抗体が陽性となる代表的な疾患を2つ挙げよ。また、胎児にどのような影響があるか答えよ。",a:"Sjögren症候群、全身性エリテマトーデスSLE。胎児房室ブロック、新生児ループス。"},
  {q:"全身性強皮症において、間質性肺炎、肺高血圧、強皮症腎クリーゼと関連が強い抗体をそれぞれ答えよ。",a:"間質性肺炎：抗トポイソメラーゼI抗体（抗Scl-70抗体）\n肺高血圧症：抗セントロメア抗体\n強皮症腎クリーゼ：抗RNAポリメラーゼⅢ抗体"},
  {q:"リウマチ性多発筋痛症PMR において筋原性酵素は上昇するか。",a:"上昇しない。"},
  {q:"成人Still病でみられる熱型の特徴を答えよ。",a:"弛張熱"},
  {q:"Sjögren症候群において低K血症を認めた場合、考えるべき病態を答えよ。",a:"腎尿細管アシドーシスⅠ型RTA-Ⅰ"},
  {q:"Behçet病の副症状を4つ挙げよ。",a:"関節炎、精巣上体炎、消化器病変（回盲部潰瘍など）、血管病変（動脈瘤、静脈炎）、中枢神経病変（無菌性髄膜炎など）"}
];

const PREFIX = 'imma_sc';
let currentState = 'all';

function buildCards() {
  const ct = document.getElementById('cards');
  ct.innerHTML = QA.map((item, i) => {
    const uid = `${PREFIX}_q${i+1}`;
    const ans = item.a.replace(/\n/g, '<br>');
    return `<div class="sc-card" data-uid="${uid}" id="sc${i+1}">
  <div class="sc-head">
    <span class="sc-num">Q.${i+1}</span>
    <div class="sc-controls">
      <button class="mec-flag-btn" data-uid="${uid}" onclick="mecToggleFlag(this)" title="苦手フラグ">🚩</button>
      <button class="mec-lap-btn" data-uid="${uid}" onclick="mecIncrLap(this)">済<span class="mec-lap-num"></span></button>
    </div>
  </div>
  <div class="sc-body">
    <div class="sc-question">${item.q}</div>
    <button class="sc-reveal-btn" onclick="toggleAnswer(this)">▶ 答えを見る</button>
    <div class="sc-answer">${ans}</div>
  </div>
</div>`;
  }).join('');
}

function toggleAnswer(btn) {
  const ans = btn.nextElementSibling;
  const open = ans.classList.toggle('open');
  btn.textContent = open ? '▼ 答えを隠す' : '▶ 答えを見る';
  btn.classList.toggle('revealed', open);
}

function setState(s) {
  currentState = s;
  document.querySelectorAll('[data-state]').forEach(b => b.classList.toggle('on', b.dataset.state === s));
  applyFilter();
}

function applyFilter() {
  const done = JSON.parse(localStorage.getItem('done_v2') || '{}');
  const flags = JSON.parse(localStorage.getItem('flag_v2') || '{}');
  let visible = 0;
  document.querySelectorAll('.sc-card[data-uid]').forEach(c => {
    const uid = c.dataset.uid;
    let show;
    if (currentState === 'all') show = true;
    else if (currentState === 'flag') show = !!flags[uid];
    else if (currentState === 'undone') show = !done[uid];
    else if (currentState === 'done') show = !!done[uid];
    else show = true;
    c.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  const vc = document.getElementById('visCount');
  if (vc) vc.textContent = visible + '問';
}

function initCards() {
  const done = JSON.parse(localStorage.getItem('done_v2') || '{}');
  const flags = JSON.parse(localStorage.getItem('flag_v2') || '{}');
  document.querySelectorAll('.sc-card[data-uid]').forEach(c => {
    const uid = c.dataset.uid;
    const lapCount = done[uid] || 0;
    const lapBtn = c.querySelector('.mec-lap-btn');
    if (lapBtn) {
      const numEl = lapBtn.querySelector('.mec-lap-num');
      if (numEl) numEl.textContent = lapCount > 0 ? lapCount : '';
      lapBtn.classList.toggle('mec-lapped', lapCount > 0);
    }
    const fb = c.querySelector('.mec-flag-btn');
    if (fb && flags[uid]) fb.classList.add('mec-flagged');
  });
  const doneCount = Object.keys(done).filter(k => k.startsWith(PREFIX)).length;
  const el = document.getElementById('statDone');
  if (el) el.textContent = doneCount;
  applyFilter();
}

buildCards();
document.addEventListener('DOMContentLoaded', () => {
  initCards();
  MECSync.syncFromGist().then(r => {
    if (r.status === 'ok') initCards();
    if (r.status === 'no-config') document.querySelectorAll('.mec-sync-badge').forEach(e => e.textContent = '⚙️ 未設定');
  });
});
</script>
</body>
</html>
